<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DAO Voting</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; padding: 20px; }
button { margin-top: 10px; }
</style>
</head>
<body>
<h2>DAO Voting</h2>
<button onclick="connectWallet()">Connect Wallet</button>
<p id="address">Not connected</p>

<h3 id="proposal"></h3>
<select id="choice"></select>
<button onclick="vote()">Vote</button>

<h3>Results</h3>
<canvas id="chart" width="400" height="200"></canvas>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyYafvu_mVs5gGBUyP0Q_5BMZzpbDY2F1OaHehhzuMP4kwdNhP6OABXSarUqH3-hm2e/exec"; // ここにデプロイ済GASのURLを入れる

let signer, userAddress, currentConfig, chart;

window.addEventListener("load", async () => {
  await loadConfig();
  await loadResults();
  setInterval(loadResults, 5000);
});

async function connectWallet() {
  if (!window.ethereum) { alert("MetaMaskをインストールしてください"); return; }
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  userAddress = await signer.getAddress();
  document.getElementById("address").innerText = userAddress;
}

async function loadConfig() {
  const res = await fetch(API_URL + "?action=config");
  currentConfig = await res.json();
  const select = document.getElementById("choice");
  select.innerHTML = "";
  currentConfig.choices.split(",").forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.trim();
    opt.innerText = c.trim();
    select.appendChild(opt);
  });
  document.getElementById("proposal").innerText = currentConfig.proposal_id;
}

async function vote() {
  if (!signer) { alert("ウォレットを接続してください"); return; }
  const choice = document.getElementById("choice").value;

  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ address: userAddress, choice })
  });

  const data = await res.json();
  alert(JSON.stringify(data));
  loadResults();
}

async function loadResults() {
  const res = await fetch(API_URL + "?action=results");
  const data = await res.json();
  const ctx = document.getElementById("chart").getContext("2d");
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: "bar",
    data: { labels: Object.keys(data), datasets: [{ label: "Votes", data: Object.values(data) }] },
    options: { responsive: true, scales: { y: { beginAtZero: true } } }
  });
}
</script>
</body>
</html>
