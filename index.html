<!DOCTYPE html>
<html>
<head>
  <title>DAO Voting</title>

  <!-- deferで確実に後から読み込み -->
  <script defer src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <h2>DAO Voting</h2>

  <button onclick="connect()">Connect Wallet</button>
  <p id="address"></p>

  <select id="choice">
    <option value="A">A</option>
    <option value="B">B</option>
  </select>

  <button onclick="vote()">Vote</button>

  <h3>Results</h3>
  <pre id="results"></pre>

  <canvas id="chart" width="400" height="200"></canvas>

<script>
const API = "GASのURLをここに";

let userAddress;
let chart;

// 🔥 ethers読み込み待ち（これが最重要）
async function waitForEthers() {
  while (typeof ethers === "undefined") {
    await new Promise(r => setTimeout(r, 50));
  }
}

// 🔗 ウォレット接続
async function connect() {
  await waitForEthers();

  try {
    if (!window.ethereum) {
      alert("MetaMaskが必要です");
      return;
    }

    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const accounts = await provider.send("eth_requestAccounts", []);

    userAddress = accounts[0];
    document.getElementById("address").innerText = userAddress;

  } catch (e) {
    console.error(e);
    alert("ウォレット接続エラー");
  }
}

// 🗳 投票
async function vote() {
  await waitForEthers();

  try {
    if (!userAddress) {
      alert("先にウォレットを接続してください");
      return;
    }

    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer = provider.getSigner();

    const message = "I vote in proposal_001";
    const signature = await signer.signMessage(message);

    const choice = document.getElementById("choice").value;

    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        address: userAddress,
        choice: choice,
        signature: signature
      })
    });

    const data = await res.json();
    alert(JSON.stringify(data));

  } catch (e) {
    console.error(e);
    alert("投票エラー");
  }
}

// 📊 結果取得
async function loadResults() {
  try {
    const res = await fetch(API + "?action=results");
    const data = await res.json();

    document.getElementById("results").innerText =
      JSON.stringify(data, null, 2);

    drawChart(data);

  } catch (e) {
    console.error(e);
  }
}

// 📊 グラフ描画
function drawChart(data) {
  const labels = Object.keys(data);
  const values = Object.values(data);

  const ctx = document.getElementById("chart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Votes",
        data: values
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });
}

// ⏱ 自動更新
setInterval(loadResults, 5000);

</script>

</body>
</html>
