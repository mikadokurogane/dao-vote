<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- ethers（安定版） -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>

<body>
  <h2>DAO Voting</h2>

  <button onclick="connect()">Connect Wallet</button>
  <p id="address">Not connected</p>

  <select id="choice">
    <option value="A">A</option>
    <option value="B">B</option>
  </select>

  <button onclick="vote()">Vote</button>

  <h3>Results</h3>
  <pre id="results">Loading...</pre>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxEMJNjJz1AtSrHxWFEK83GqojYi5dlNPBonLcbW_JlORueT-OxhIPmEjhQmBdH7vJc/exec";

let signer = null;
let userAddress = null;

// ethers読み込みチェック
window.addEventListener("load", () => {
  if (typeof ethers === "undefined") {
    alert("ethersの読み込みに失敗しています（CDNエラー）");
  }
});

// ウォレット接続
async function connect() {
  try {
    if (!window.ethereum) {
      alert("MetaMaskをインストールしてください");
      return;
    }

    const provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);

    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    document.getElementById("address").innerText = userAddress;

  } catch (err) {
    alert("接続エラー: " + err.message);
  }
}

// 投票処理
async function vote() {
  try {
    if (!signer) {
      alert("先にウォレット接続してください");
      return;
    }

    const choice = document.getElementById("choice").value;

    const message = "I vote in proposal_001";

    const signature = await signer.signMessage(message);

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        address: userAddress,
        choice: choice,
        signature: signature
      })
    });

    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      alert("APIエラー:\n" + text);
      return;
    }

    alert(JSON.stringify(data));

  } catch (err) {
    alert("投票エラー: " + err.message);
  }
}

// 結果取得
async function loadResults() {
  try {
    const res = await fetch(API_URL + "?action=results");

    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      document.getElementById("results").innerText = "Error:\n" + text;
      return;
    }

    document.getElementById("results").innerText = JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("results").innerText = "取得エラー: " + err.message;
  }
}

// 初回ロード
loadResults();

// 5秒ごと更新
setInterval(loadResults, 5000);
</script>

</body>
</html>
