<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>DAO Voting</title>
</head>
<body>
<h2>DAO Voting</h2>
<button onclick="connectWallet()">Connect Wallet</button>
<p id="address">Not connected</p>

<h3 id="proposal"></h3>
<select id="choice"></select>
<button onclick="vote()">Vote</button>

<h3>Results</h3>
<canvas id="chart" width="400" height="200"></canvas>

<script>
const API_URL = location.href.replace(/\/$/, ""); // 同じGASにアクセス
let signer, userAddress;
let currentConfig = null;
let chart = null;

// 初期ロード
window.addEventListener("load", async () => {
  await loadConfig();
  await loadResults();
  setInterval(loadResults, 5000);
});

// ウォレット接続
async function connectWallet() {
  if (!window.ethereum) { alert("MetaMaskをインストールしてください"); return; }
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  userAddress = await signer.getAddress();
  document.getElementById("address").innerText = userAddress;
}

// 設定ロード
async function loadConfig() {
  const res = await fetch(API_URL + "?action=config");
  currentConfig = await res.json();

  // 選択肢描画
  const select = document.getElementById("choice");
  select.innerHTML = "";
  if (currentConfig.choices) {
    currentConfig.choices.split(",").forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.trim();
      opt.innerText = c.trim();
      select.appendChild(opt);
    });
  }
  document.getElementById("proposal").innerText = currentConfig.proposal_id;
}

// 結果取得
async function loadResults() {
  const res = await fetch(API_URL + "?action=results");
  const data = await res.json();

  const ctx = document.getElementById("chart").getContext("2d");
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: "bar",
    data: { labels: Object.keys(data), datasets: [{ label: "Votes", data: Object.values(data) }] },
    options: { scales: { y: { beginAtZero: true } } }
  });
}

// 投票
async function vote() {
  if (!signer) { alert("ウォレットを接続してください"); return; }
  const choice = document.getElementById("choice").value;
  const signature = await signer.signMessage(currentConfig.message);

  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ address: userAddress, choice, signature })
  });
  const data = await res.json();
  alert(JSON.stringify(data));

  await loadResults(); // リロード不要で結果更新
}
</script>
</body>
</html>
