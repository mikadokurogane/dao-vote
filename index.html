<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>DAO Voting</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  select, button { font-size: 16px; margin: 5px 0; }
</style>
</head>
<body>
<h2>DAO Voting</h2>
<button id="connect">Connect Wallet</button>
<p id="address">Not connected</p>

<h3 id="proposal"></h3>
<select id="choice"></select>
<button id="vote">Vote</button>

<h3>Results</h3>
<canvas id="chart" width="400" height="200"></canvas>

<script>
let signer, userAddress, chart;
const CONFIG = JSON.parse(`<?= config ?>`);
const GAS_URL = window.location.href;

// ウォレット接続
document.getElementById("connect").onclick = async () => {
  if (!window.ethereum) { alert("MetaMaskをインストールしてください"); return; }
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  userAddress = await signer.getAddress();
  document.getElementById("address").innerText = userAddress;
};

// 選択肢表示
window.addEventListener("load", () => {
  document.getElementById("proposal").innerText = CONFIG.proposal_id;
  const select = document.getElementById("choice");
  select.innerHTML = "";
  if (CONFIG.choices) {
    CONFIG.choices.split(",").forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.trim();
      opt.innerText = c.trim();
      select.appendChild(opt);
    });
  }
  loadResults();
  setInterval(loadResults, 5000);
});

// 投票
document.getElementById("vote").onclick = async () => {
  if (!signer) { alert("ウォレット接続してください"); return; }
  const choice = document.getElementById("choice").value;
  const signature = await signer.signMessage(CONFIG.message);

  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ address: userAddress, choice, signature })
  });
  const data = await res.json();
  alert(JSON.stringify(data));
  loadResults();
};

// 結果取得
async function loadResults() {
  const res = await fetch(GAS_URL + "?action=results");
  const data = await res.json();
  const ctx = document.getElementById("chart").getContext("2d");
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: { labels: Object.keys(data), datasets: [{ label: "Votes", data: Object.values(data) }] }
  });
}
</script>
</body>
</html>
