<div id="dao-vote-app">
  <h2>DAO Voting</h2>
  <button id="connectWalletBtn">Connect Wallet</button>
  <p id="address">Not connected</p>

  <h3 id="proposal"></h3>
  <select id="choice"></select>
  <button id="voteBtn">Vote</button>

  <h3>Results</h3>
  <canvas id="chart" width="400" height="200"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyYafvu_mVs5gGBUyP0Q_5BMZzpbDY2F1OaHehhzuMP4kwdNhP6OABXSarUqH3-hm2e/exec";
let signer, userAddress, currentConfig, chart;

window.addEventListener("load", async () => {
  await loadConfig();
  await loadResults();
  setInterval(loadResults, 5000);
});

document.getElementById("connectWalletBtn").onclick = async () => {
  if (!window.ethereum) return alert("MetaMaskをインストールしてください");
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  userAddress = await signer.getAddress();
  document.getElementById("address").innerText = userAddress;
};

document.getElementById("voteBtn").onclick = async () => {
  if (!signer) return alert("ウォレットを接続してください");
  const choice = document.getElementById("choice").value;
  const signature = await signer.signMessage(currentConfig.message);

  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ address: userAddress, choice, signature })
  });
  const data = await res.json();
  alert(JSON.stringify(data));
  await loadResults();
};

async function loadConfig() {
  const res = await fetch(API_URL + "?action=config");
  currentConfig = await res.json();
  document.getElementById("proposal").innerText = currentConfig.proposal_id;

  const select = document.getElementById("choice");
  select.innerHTML = "";
  currentConfig.choices.split(",").forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.trim();
    opt.innerText = c.trim();
    select.appendChild(opt);
  });
}

async function loadResults() {
  const res = await fetch(API_URL + "?action=results");
  const data = await res.json();
  const ctx = document.getElementById("chart").getContext("2d");
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: "bar",
    data: { labels: Object.keys(data), datasets: [{ label: "Votes", data: Object.values(data) }] }
  });
}
</script>
