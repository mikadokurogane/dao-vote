<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>DAO Voting</title>
</head>
<body>
<h2>DAO Voting</h2>
<button onclick="connectWallet()">Connect Wallet</button>
<p id="address">Not connected</p>

<h3 id="proposal"></h3>
<select id="choice"></select>
<button onclick="vote()">Vote</button>

<h3>Results</h3>
<canvas id="chart" width="400" height="200"></canvas>

<script>
let signer, userAddress;
let currentConfig = <?= JSON.stringify(config) ?>;
let currentResults = <?= JSON.stringify(results) ?>;
let chart = null;

// ページロード時に選択肢とグラフを描画
window.addEventListener("load", () => {
  renderChoices();
  renderChart();
  document.getElementById("proposal").innerText = currentConfig.proposal_id;
});

// ウォレット接続
async function connectWallet() {
  if (!window.ethereum) { alert("MetaMaskをインストールしてください"); return; }
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  userAddress = await signer.getAddress();
  document.getElementById("address").innerText = userAddress;
}

// 選択肢描画
function renderChoices() {
  const select = document.getElementById("choice");
  select.innerHTML = "";
  if (currentConfig.choices) {
    currentConfig.choices.split(",").forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.trim();
      opt.innerText = c.trim();
      select.appendChild(opt);
    });
  }
}

// グラフ描画
function renderChart() {
  const ctx = document.getElementById("chart").getContext("2d");
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: "bar",
    data: { labels: Object.keys(currentResults), datasets: [{ label: "Votes", data: Object.values(currentResults) }] },
    options: { scales: { y: { beginAtZero: true } } }
  });
}

// 投票処理
async function vote() {
  if (!signer) { alert("ウォレットを接続してください"); return; }
  const choice = document.getElementById("choice").value;
  const signature = await signer.signMessage(currentConfig.message);

  const res = await fetch("", { // 同じGASにPOST
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ address: userAddress, choice, signature })
  });

  const data = await res.json();
  alert(JSON.stringify(data));

  // 投票後にページ更新
  location.reload();
}
</script>
</body>
</html>
