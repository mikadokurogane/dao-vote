<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DAO NFT 投票</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; }
    button { margin: 5px 0; padding: 8px 16px; }
    #results { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>

<h2>DAO NFT 投票フォーム</h2>

<div>
  <button id="connectButton">ウォレット接続</button>
  <p id="walletAddress"></p>
</div>

<div>
  <label>
    選択肢：
    <select id="choiceSelect">
      <option value="A">A</option>
      <option value="B">B</option>
    </select>
  </label>
</div>

<div>
  <button id="voteButton">投票する</button>
  <p id="voteStatus"></p>
</div>

<h3>リアルタイム結果</h3>
<div id="results">Loading...</div>

<script>
let provider;
let signer;
let userAddress;

// 👇 Apps Script デプロイ URL に置き換える
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVcVyM2pPWJPB6iYzDTpzJoJtje-l1V_OINDb_9foB--ONlZB-bzCUUc8rnhsV1OFd/exec";

// ウォレット接続
document.getElementById("connectButton").onclick = async () => {
  if (typeof window.ethereum === 'undefined') {
    alert("MetaMaskが必要です");
    return;
  }
  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  userAddress = await signer.getAddress();
  document.getElementById("walletAddress").innerText = "接続済み: " + userAddress;
};

// 投票
document.getElementById("voteButton").onclick = async () => {
  if (!signer) {
    alert("ウォレットを接続してください");
    return;
  }
  const choice = document.getElementById("choiceSelect").value;

  const message = `I vote in proposal_001\nNonce: 12345`;
  const signature = await signer.signMessage(message);

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      address: userAddress,
      choice: choice,
      signature: signature
    })
  });
  const data = await res.json();
  document.getElementById("voteStatus").innerText = data.result;

  // 投票後すぐに結果更新
  loadResults();
};

// リアルタイム結果取得
async function loadResults() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    let html = "";
    for (let key in data) {
      html += `${key}: ${data[key]}票<br>`;
    }
    document.getElementById("results").innerHTML = html;
  } catch(e) {
    document.getElementById("results").innerText = "結果を取得できません";
    console.error(e);
  }
}

// 3秒ごとに更新
setInterval(loadResults, 3000);
loadResults();
</script>

</body>
</html>
